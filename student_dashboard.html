<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARTANS - Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient-orb ambient-orb-1"></div>
    <div class="ambient-orb ambient-orb-2"></div>

    <nav class="dynamic-island-nav">
        <span class="nav-brand">SPARTANS</span>
        <span class="nav-clock" id="navClock"></span>
        <div class="nav-user">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
            <span class="nav-link" id="navStudentId"></span>
            <a class="nav-link" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Search View -->
        <div id="searchView">
            <h1 class="section-title">Professor Directory</h1>
            
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search professor by name..." oninput="filterProfessors()">
                <datalist id="professorList"></datalist>
            </div>

            <div id="pinnedSection" class="pinned-section" style="display: none;">
                <h3>📌 Pinned Professors</h3>
                <div class="professors-grid" id="pinnedGrid"></div>
            </div>

            <h3 style="margin-bottom: 16px; font-size: 1.1rem; color: var(--text-secondary);">All Professors</h3>
            <div class="professors-grid" id="professorsGrid"></div>
        </div>

        <!-- Professor Detail View -->
        <div id="detailView" style="display: none;">
            <a class="back-btn" onclick="showSearchView()">&#8592; Back to Directory</a>
            
            <div class="dashboard-card glass-panel">
                <div class="prof-detail-header">
                    <div class="prof-detail-avatar" id="detailAvatar"></div>
                    <div class="prof-detail-info">
                        <h2 id="detailName"></h2>
                        <p style="color: var(--text-secondary);" id="detailId"></p>
                        <div class="prof-detail-status" id="detailStatus"></div>
                    </div>
                </div>
                <div id="detailNote" class="prof-detail-note" style="display: none;"></div>
            </div>

            <div class="dashboard-card glass-panel" style="margin-top: 24px;">
                <h3>Schedule</h3>
                <div id="detailSchedules"></div>
            </div>
        </div>
    </div>

    <script>
        let professors = [];
        let pinnedProfessors = [];
        let viewingProfessor = null;
        let refreshInterval = null;

        function init() {
            if (!sessionStorage.getItem('studentLoggedIn')) {
                window.location.href = 'index.html';
                return;
            }

            const srCode = sessionStorage.getItem('studentSRCode');
            document.getElementById('navStudentId').textContent = srCode;

            updateClock();
            setInterval(updateClock, 1000);

            loadProfessors();
            loadPinned();
            renderAllProfessors();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('navClock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function loadProfessors() {
            professors = JSON.parse(localStorage.getItem('professors') || '[]');
            updateDatalist();
        }

        function loadPinned() {
            pinnedProfessors = JSON.parse(localStorage.getItem('pinnedProfessors') || '[]');
        }

        function savePinned() {
            localStorage.setItem('pinnedProfessors', JSON.stringify(pinnedProfessors));
        }

        function updateDatalist() {
            const datalist = document.getElementById('professorList');
            datalist.innerHTML = '';
            professors.forEach(p => {
                const option = document.createElement('option');
                option.value = `${p.firstName} ${p.lastName}`;
                datalist.appendChild(option);
            });
        }

        function filterProfessors() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderAllProfessors(query);
        }

        function renderAllProfessors(query = '') {
            const grid = document.getElementById('professorsGrid');
            let filtered = professors;
            
            if (query) {
                filtered = professors.filter(p => 
                    `${p.firstName} ${p.lastName}`.toLowerCase().includes(query)
                );
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👨‍🏫</div><p>No professors found.</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(p => renderProfessorCard(p)).join('');
            renderPinned();
        }

        function renderProfessorCard(p) {
            const isPinned = pinnedProfessors.includes(p.id);
            const initials = p.firstName[0] + p.lastName[0];
            const avatarHtml = p.avatar 
                ? `<img src="${p.avatar}" alt="${p.firstName} ${p.lastName}">` 
                : initials;
            
            const statusClass = p.status === 'AVAILABLE' ? 'status-available' : 'status-busy';
            const statusText = p.status === 'AVAILABLE' ? 'Available' : 'Busy';
            
            return `
                <div class="professor-card glass-panel" onclick="viewProfessor('${p.id}')">
                    <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin(event, '${p.id}')">
                        ${isPinned ? '★' : '☆'}
                    </button>
                    <div class="professor-card-header">
                        <div class="professor-card-avatar">${avatarHtml}</div>
                        <div>
                            <div class="professor-card-name">${p.firstName} ${p.lastName}</div>
                            <div class="professor-card-id">${p.id}</div>
                        </div>
                    </div>
                    <div class="status-badge ${statusClass}">
                        <span class="status-dot"></span>
                        ${statusText}
                    </div>
                </div>
            `;
        }

        function renderPinned() {
            const section = document.getElementById('pinnedSection');
            const grid = document.getElementById('pinnedGrid');
            
            if (pinnedProfessors.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            section.style.display = 'block';
            const pinnedProfs = professors.filter(p => pinnedProfessors.includes(p.id));
            grid.innerHTML = pinnedProfs.map(p => renderProfessorCard(p)).join('');
        }

        function togglePin(event, profId) {
            event.stopPropagation();
            
            if (pinnedProfessors.includes(profId)) {
                pinnedProfessors = pinnedProfessors.filter(id => id !== profId);
            } else {
                pinnedProfessors.push(profId);
            }
            
            savePinned();
            
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderAllProfessors(query);
        }

        function viewProfessor(profId) {
            viewingProfessor = professors.find(p => p.id === profId);
            if (!viewingProfessor) return;

            document.getElementById('searchView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';

            renderProfessorDetail();
            
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(refreshStatus, 60000);
        }

        function showSearchView() {
            document.getElementById('searchView').style.display = 'block';
            document.getElementById('detailView').style.display = 'none';
            viewingProfessor = null;
            
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        function renderProfessorDetail() {
            const p = viewingProfessor;
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            
            const initials = p.firstName[0] + p.lastName[0];
            const avatarEl = document.getElementById('detailAvatar');
            avatarEl.innerHTML = p.avatar ? `<img src="${p.avatar}" alt="Avatar">` : initials;
            
            document.getElementById('detailName').textContent = `${p.firstName} ${p.lastName}`;
            document.getElementById('detailId').textContent = p.id;
            
            let currentStatus = p.status;
            for (const sched of p.schedules) {
                if (sched.day === today) {
                    const start = parseInt(sched.startTime.split(':')[0]) * 60 + parseInt(sched.startTime.split(':')[1]);
                    const end = parseInt(sched.endTime.split(':')[0]) * 60 + parseInt(sched.endTime.split(':')[1]);
                    if (currentTime >= start && currentTime <= end) {
                        currentStatus = 'BUSY';
                        break;
                    }
                }
            }
            
            const statusClass = currentStatus === 'AVAILABLE' ? 'status-available' : 'status-busy';
            const statusText = currentStatus === 'AVAILABLE' ? 'Available' : 'Busy';
            document.getElementById('detailStatus').innerHTML = `
                <span class="status-badge ${statusClass}">
                    <span class="status-dot"></span>
                    ${statusText}
                </span>
            `;
            
            const noteEl = document.getElementById('detailNote');
            if (p.statusNote) {
                noteEl.style.display = 'block';
                noteEl.textContent = p.statusNote;
            } else {
                noteEl.style.display = 'none';
            }
            
            const schedulesContainer = document.getElementById('detailSchedules');
            if (p.schedules.length === 0) {
                schedulesContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><p>No schedules available.</p></div>';
                return;
            }
            
            const daysOrder = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const sorted = [...p.schedules].sort((a, b) => {
                const dayDiff = daysOrder.indexOf(a.day) - daysOrder.indexOf(b.day);
                if (dayDiff !== 0) return dayDiff;
                return a.startTime.localeCompare(b.startTime);
            });
            
            let html = '<table class="schedule-table"><thead><tr><th>Day</th><th>Time</th><th>Program</th><th>Course</th><th>Room</th></tr></thead><tbody>';
            
            sorted.forEach(sched => {
                const isToday = sched.day === today;
                html += `<tr class="${isToday ? 'today-class' : ''}">
                    <td>${sched.day} ${isToday ? '(Today)' : ''}</td>
                    <td>${sched.startTime} - ${sched.endTime}</td>
                    <td>${sched.program} ${sched.yearLevel}Y</td>
                    <td>${sched.course}</td>
                    <td>${sched.room}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            schedulesContainer.innerHTML = html;
        }

        function refreshStatus() {
            if (viewingProfessor) {
                loadProfessors();
                const updated = professors.find(p => p.id === viewingProfessor.id);
                if (updated) {
                    viewingProfessor = updated;
                    renderProfessorDetail();
                }
            }
        }

        function logout() {
            sessionStorage.removeItem('studentLoggedIn');
            sessionStorage.removeItem('studentSRCode');
            window.location.href = 'index.html';
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            btn.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('spartansTheme', isLight ? 'light' : 'dark');
        }

        (function() {
            const saved = localStorage.getItem('spartansTheme');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                const btn = document.getElementById('themeToggle');
                if (btn) btn.textContent = '☀️';
            }
        })();

        init();
    </script>
</body>
</html>
